<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard amministratore — Torneo di Bocce Pratieghi</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Karla:wght@400;500;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

    :root {
      --cipresso: #2B3D2F;
      --terracotta: #B8503B;
      --terracotta-scuro: #9A3F2E;
      --carta: #F6EFDF;
      --campo-ghiaia: #E9DCC3;
      --campo-ghiaia-scuro: #D8C7A3;
      --inchiostro: #23281F;
      --inchiostro-soft: #4A4E42;
      --ottone: #C79A48;
      --font-display: 'Fraunces', serif;
      --font-body: 'Karla', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
      --radius: 4px;
      --shadow-soft: 0 6px 20px rgba(35, 40, 31, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font-body);
      background: var(--campo-ghiaia);
      color: var(--inchiostro);
      line-height: 1.5;
    }

    .topbar-admin {
      background: var(--cipresso);
      color: var(--carta);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.8rem;
    }

    .topbar-admin .titolo-area {
      font-family: var(--font-display);
      font-size: 1.2rem;
    }

    .topbar-admin .titolo-area span {
      color: var(--ottone);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      display: block;
      letter-spacing: 0.1em;
    }

    .btn {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      letter-spacing: 0.03em;
      padding: 0.65rem 1.2rem;
      border-radius: var(--radius);
      border: 1.5px solid var(--inchiostro);
      background: transparent;
      color: var(--inchiostro);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .topbar-admin .btn {
      border-color: var(--carta);
      color: var(--carta);
    }
    .topbar-admin .btn:hover { background: var(--carta); color: var(--inchiostro); }

    .btn-primario {
      background: var(--terracotta);
      border-color: var(--terracotta);
      color: var(--carta);
    }
    .btn-primario:hover { background: var(--terracotta-scuro); }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .contenitore {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.2rem 4rem;
    }

    .barra-edizione {
      background: var(--carta);
      border: 1px solid var(--campo-ghiaia-scuro);
      border-radius: var(--radius);
      padding: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .barra-edizione label {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--inchiostro-soft);
    }

    .barra-edizione select {
      font-family: var(--font-mono);
      font-size: 0.95rem;
      padding: 0.5rem 0.8rem;
      border: 1.5px solid var(--inchiostro);
      border-radius: var(--radius);
      background: var(--carta);
      color: var(--inchiostro);
    }

    .card {
      background: var(--carta);
      border-radius: var(--radius);
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--campo-ghiaia-scuro);
      padding: 1.6rem;
      margin-bottom: 1.6rem;
    }

    .card h2 {
      font-family: var(--font-display);
      font-size: 1.4rem;
      margin: 0 0 0.3rem;
    }

    .card .sottotitolo {
      color: var(--inchiostro-soft);
      font-size: 0.92rem;
      margin: 0 0 1.2rem;
    }

    .griglia-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.4rem;
    }
    @media (max-width: 640px) {
      .griglia-2 { grid-template-columns: 1fr; }
    }

    .gruppo h3 {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--terracotta-scuro);
      margin: 0 0 0.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .gruppo h3 .conteggio {
      background: var(--campo-ghiaia);
      color: var(--inchiostro);
      padding: 0.1rem 0.55rem;
      border-radius: 999px;
      font-size: 0.75rem;
    }

    .form-riga {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .form-riga input[type=text] {
      flex: 1;
      font-family: var(--font-body);
      font-size: 0.95rem;
      padding: 0.6rem 0.75rem;
      border: 1.5px solid var(--campo-ghiaia-scuro);
      border-radius: var(--radius);
    }

    .form-riga input:focus { outline: none; border-color: var(--terracotta); }

    .lista-nomi {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      max-height: 340px;
      overflow-y: auto;
    }

    .lista-nomi li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0.7rem;
      border-bottom: 1px dashed var(--campo-ghiaia-scuro);
      font-size: 0.95rem;
    }

    .lista-nomi li button {
      border: none;
      background: none;
      color: var(--terracotta-scuro);
      cursor: pointer;
      font-size: 0.85rem;
      font-family: var(--font-mono);
    }

    .lista-nomi li button:hover { text-decoration: underline; }

    .vuoto {
      color: var(--inchiostro-soft);
      font-style: italic;
      font-size: 0.9rem;
      padding: 0.6rem 0;
    }

    details.blocco-incolla {
      margin-top: 0.6rem;
    }
    details.blocco-incolla summary {
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--terracotta-scuro);
    }
    details.blocco-incolla textarea {
      width: 100%;
      margin-top: 0.6rem;
      font-family: var(--font-mono);
      font-size: 0.88rem;
      padding: 0.6rem;
      border: 1.5px solid var(--campo-ghiaia-scuro);
      border-radius: var(--radius);
      resize: vertical;
      min-height: 90px;
    }
    details.blocco-incolla .btn { margin-top: 0.5rem; }

    .messaggio {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      padding: 0.6rem 0.9rem;
      border-radius: var(--radius);
      margin-bottom: 1.2rem;
      display: none;
    }
    .messaggio.visibile { display: block; }
    .messaggio.errore {
      background: rgba(184, 80, 59, 0.1);
      border: 1px solid var(--terracotta);
      color: var(--terracotta-scuro);
    }
    .messaggio.successo {
      background: rgba(43, 61, 47, 0.08);
      border: 1px solid var(--cipresso);
      color: var(--cipresso);
    }

    .stato-vuoto-edizione {
      text-align: center;
      padding: 3rem 1.5rem;
      color: var(--inchiostro-soft);
    }

    .nuova-edizione-box {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .nuova-edizione-box input[type=number] {
      width: 100px;
      font-family: var(--font-mono);
      font-size: 0.95rem;
      padding: 0.5rem 0.7rem;
      border: 1.5px solid var(--inchiostro);
      border-radius: var(--radius);
    }

    /* ---------- Sorteggio e tabellone ---------- */
    .riga-sorteggio {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .riga-sorteggio select {
      font-family: var(--font-mono);
      font-size: 0.95rem;
      padding: 0.5rem 0.8rem;
      border: 1.5px solid var(--inchiostro);
      border-radius: var(--radius);
      background: #fff;
    }

    .badge-bloccato {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      padding: 0.25rem 0.7rem;
      border-radius: 999px;
      background: var(--cipresso);
      color: var(--carta);
    }

    .griglia-coppie-lista {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.6rem;
      margin-bottom: 1.4rem;
    }

    .coppia-mini {
      background: #fff;
      border: 1px solid var(--campo-ghiaia-scuro);
      border-left: 3px solid var(--terracotta);
      border-radius: var(--radius);
      padding: 0.6rem 0.8rem;
      font-size: 0.9rem;
    }

    .tabellone-wrap {
      overflow-x: auto;
      padding-bottom: 0.5rem;
    }

    .tabellone {
      display: flex;
      gap: 2rem;
      min-width: max-content;
      padding: 0.5rem 0.1rem;
    }

    .turno-colonna {
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      gap: 0.9rem;
      min-width: 190px;
    }

    .turno-titolo {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--inchiostro-soft);
      text-align: center;
      margin-bottom: 0.3rem;
    }

    .match-box {
      background: #fff;
      border: 1px solid var(--campo-ghiaia-scuro);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .match-box .lato {
      padding: 0.5rem 0.7rem;
      font-size: 0.86rem;
    }

    .match-box .lato:first-child { border-bottom: 1px solid var(--campo-ghiaia-scuro); }

    .match-box .lato.vince {
      background: var(--cipresso);
      color: var(--carta);
      font-weight: 600;
    }

    .match-box .lato.bye {
      color: var(--inchiostro-soft);
      font-style: italic;
    }

    .match-box .lato.vuoto {
      color: var(--campo-ghiaia-scuro);
    }
  </style>
</head>
<body>

  <div class="topbar-admin">
    <div class="titolo-area">
      Area amministratore
      <span id="email-utente">Verifica accesso…</span>
    </div>
    <button class="btn" id="btn-logout">Esci</button>
  </div>

  <div class="contenitore">

    <div class="barra-edizione">
      <label for="selettore-edizione">Edizione:</label>
      <select id="selettore-edizione"><option>Caricamento…</option></select>
      <button class="btn" id="btn-mostra-nuova">+ Nuova edizione</button>
      <div class="nuova-edizione-box" id="box-nuova-edizione" style="display:none;">
        <input type="number" id="input-nuovo-anno" placeholder="es. 2027">
        <button class="btn btn-primario" id="btn-crea-edizione">Crea</button>
        <button class="btn" id="btn-annulla-nuova">Annulla</button>
      </div>
    </div>

    <div class="messaggio" id="messaggio"></div>

    <div id="contenuto-edizione">
      <div class="stato-vuoto-edizione">Nessuna edizione selezionata.</div>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth, onAuthStateChanged, signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore, doc, setDoc, getDoc, collection, getDocs,
      addDoc, deleteDoc, query, orderBy, writeBatch, documentId
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDLqQY2FLbEJvkkglQE_Eq_bfR1GhYhw1U",
      authDomain: "torneo-bocce-pratieghi.firebaseapp.com",
      projectId: "torneo-bocce-pratieghi",
      storageBucket: "torneo-bocce-pratieghi.firebasestorage.app",
      messagingSenderId: "1002638493349",
      appId: "1:1002638493349:web:d80c5675e315aca71f6f4c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ---------- Elementi della pagina ----------
    const emailUtente = document.getElementById("email-utente");
    const btnLogout = document.getElementById("btn-logout");
    const selettoreEdizione = document.getElementById("selettore-edizione");
    const btnMostraNuova = document.getElementById("btn-mostra-nuova");
    const boxNuovaEdizione = document.getElementById("box-nuova-edizione");
    const inputNuovoAnno = document.getElementById("input-nuovo-anno");
    const btnCreaEdizione = document.getElementById("btn-crea-edizione");
    const btnAnnullaNuova = document.getElementById("btn-annulla-nuova");
    const contenutoEdizione = document.getElementById("contenuto-edizione");
    const boxMessaggio = document.getElementById("messaggio");

    let annoCorrente = null;

    // ---------- Autenticazione ----------
    onAuthStateChanged(auth, user => {
      if (!user) {
        window.location.href = "login.html";
      } else {
        emailUtente.textContent = user.email;
        caricaEdizioni();
      }
    });

    btnLogout.addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "login.html";
    });

    // ---------- Messaggi ----------
    function mostraMessaggio(testo, tipo) {
      boxMessaggio.textContent = testo;
      boxMessaggio.className = `messaggio visibile ${tipo}`;
      if (tipo === "successo") {
        setTimeout(() => boxMessaggio.classList.remove("visibile"), 4000);
      }
    }

    // ---------- Gestione edizioni ----------
    async function caricaEdizioni() {
      try {
        const snap = await getDocs(collection(db, "tornei"));
        selettoreEdizione.innerHTML = "";

        if (snap.empty) {
          selettoreEdizione.innerHTML = `<option value="">Nessuna edizione</option>`;
          renderStatoVuoto();
          return;
        }

        const anni = [];
        snap.forEach(docSnap => anni.push(docSnap.id));
        anni.sort((a, b) => b.localeCompare(a));

        anni.forEach(anno => {
          const opt = document.createElement("option");
          opt.value = anno;
          opt.textContent = anno;
          selettoreEdizione.appendChild(opt);
        });

        annoCorrente = selettoreEdizione.value;
        renderEdizione(annoCorrente);
      } catch (errore) {
        console.error(errore);
        selettoreEdizione.innerHTML = `<option value="">Errore</option>`;
        mostraMessaggio(`Errore nel caricamento delle edizioni: ${errore.message}`, "errore");
      }
    }

    selettoreEdizione.addEventListener("change", () => {
      annoCorrente = selettoreEdizione.value;
      renderEdizione(annoCorrente);
    });

    btnMostraNuova.addEventListener("click", () => {
      boxNuovaEdizione.style.display = "flex";
      inputNuovoAnno.focus();
    });

    btnAnnullaNuova.addEventListener("click", () => {
      boxNuovaEdizione.style.display = "none";
      inputNuovoAnno.value = "";
    });

    btnCreaEdizione.addEventListener("click", async () => {
      const anno = inputNuovoAnno.value.trim();
      if (!anno || anno.length !== 4) {
        mostraMessaggio("Inserisci un anno valido, es. 2027.", "errore");
        return;
      }

      const rifDoc = doc(db, "tornei", anno);
      const esistente = await getDoc(rifDoc);
      if (esistente.exists()) {
        mostraMessaggio(`L'edizione ${anno} esiste già.`, "errore");
        return;
      }

      await setDoc(rifDoc, {
        dimensioneTabellone: null,
        bloccato: false,
        dataCreazione: new Date().toISOString()
      });

      mostraMessaggio(`Edizione ${anno} creata.`, "successo");
      boxNuovaEdizione.style.display = "none";
      inputNuovoAnno.value = "";
      await caricaEdizioni();
      selettoreEdizione.value = anno;
      annoCorrente = anno;
      renderEdizione(anno);
    });

    function renderStatoVuoto() {
      contenutoEdizione.innerHTML = `
        <div class="stato-vuoto-edizione">
          Nessuna edizione ancora creata. Tocca "+ Nuova edizione" per iniziare.
        </div>
      `;
    }

    // ---------- Gestione partecipanti ----------
    async function renderEdizione(anno) {
      if (!anno) { renderStatoVuoto(); return; }

      contenutoEdizione.innerHTML = `
        <div class="card">
          <h2>Partecipanti — Edizione ${anno}</h2>
          <p class="sottotitolo">Inserisci uomini e donne. Il sorteggio si farà nella fase successiva.</p>
          <div class="griglia-2">
            <div class="gruppo">
              <h3>Uomini <span class="conteggio" id="conteggio-uomini">0</span></h3>
              <div class="form-riga">
                <input type="text" id="input-uomo" placeholder="Nome e cognome">
                <button class="btn btn-primario" id="btn-aggiungi-uomo">Aggiungi</button>
              </div>
              <ul class="lista-nomi" id="lista-uomini"></ul>
              <details class="blocco-incolla">
                <summary>Incolla più nomi insieme</summary>
                <textarea id="incolla-uomini" placeholder="Un nome per riga&#10;Marco Bianchi&#10;Luca Rossi"></textarea>
                <button class="btn" id="btn-incolla-uomini">Aggiungi tutti</button>
              </details>
            </div>
            <div class="gruppo">
              <h3>Donne <span class="conteggio" id="conteggio-donne">0</span></h3>
              <div class="form-riga">
                <input type="text" id="input-donna" placeholder="Nome e cognome">
                <button class="btn btn-primario" id="btn-aggiungi-donna">Aggiungi</button>
              </div>
              <ul class="lista-nomi" id="lista-donne"></ul>
              <details class="blocco-incolla">
                <summary>Incolla più nomi insieme</summary>
                <textarea id="incolla-donne" placeholder="Un nome per riga&#10;Sara Galli&#10;Elisa Fontana"></textarea>
                <button class="btn" id="btn-incolla-donne">Aggiungi tutti</button>
              </details>
            </div>
          </div>
        </div>

        <div class="card" id="card-sorteggio">
          <h2>Sorteggio e tabellone</h2>
          <p class="sottotitolo">Caricamento…</p>
        </div>
      `;

      collegaEventiPartecipanti(anno);
      await caricaPartecipanti(anno);
      await renderSorteggio(anno);
    }

    function collegaEventiPartecipanti(anno) {
      document.getElementById("btn-aggiungi-uomo").addEventListener("click", () => {
        aggiungiPartecipante(anno, "uomo", document.getElementById("input-uomo"));
      });
      document.getElementById("btn-aggiungi-donna").addEventListener("click", () => {
        aggiungiPartecipante(anno, "donna", document.getElementById("input-donna"));
      });
      document.getElementById("input-uomo").addEventListener("keydown", e => {
        if (e.key === "Enter") aggiungiPartecipante(anno, "uomo", e.target);
      });
      document.getElementById("input-donna").addEventListener("keydown", e => {
        if (e.key === "Enter") aggiungiPartecipante(anno, "donna", e.target);
      });
      document.getElementById("btn-incolla-uomini").addEventListener("click", () => {
        aggiungiBlocco(anno, "uomo", document.getElementById("incolla-uomini"));
      });
      document.getElementById("btn-incolla-donne").addEventListener("click", () => {
        aggiungiBlocco(anno, "donna", document.getElementById("incolla-donne"));
      });
    }

    async function aggiungiPartecipante(anno, genere, inputEl) {
      const nome = inputEl.value.trim();
      if (!nome) return;
      await addDoc(collection(db, "tornei", anno, "partecipanti"), { nome, genere });
      inputEl.value = "";
      await caricaPartecipanti(anno);
    }

    async function aggiungiBlocco(anno, genere, textareaEl) {
      const righe = textareaEl.value.split("\n").map(r => r.trim()).filter(Boolean);
      if (righe.length === 0) return;

      const batch = writeBatch(db);
      righe.forEach(nome => {
        const rifNuovo = doc(collection(db, "tornei", anno, "partecipanti"));
        batch.set(rifNuovo, { nome, genere });
      });
      await batch.commit();

      textareaEl.value = "";
      mostraMessaggio(`Aggiunti ${righe.length} nomi.`, "successo");
      await caricaPartecipanti(anno);
    }

    async function eliminaPartecipante(anno, id) {
      await deleteDoc(doc(db, "tornei", anno, "partecipanti", id));
      await caricaPartecipanti(anno);
    }

    async function caricaPartecipanti(anno) {
      const snap = await getDocs(collection(db, "tornei", anno, "partecipanti"));
      const uomini = [];
      const donne = [];

      snap.forEach(docSnap => {
        const dati = { id: docSnap.id, ...docSnap.data() };
        if (dati.genere === "uomo") uomini.push(dati);
        else donne.push(dati);
      });

      uomini.sort((a, b) => a.nome.localeCompare(b.nome));
      donne.sort((a, b) => a.nome.localeCompare(b.nome));

      renderListaNomi("lista-uomini", uomini, anno);
      renderListaNomi("lista-donne", donne, anno);
      document.getElementById("conteggio-uomini").textContent = uomini.length;
      document.getElementById("conteggio-donne").textContent = donne.length;
    }

    function renderListaNomi(idLista, persone, anno) {
      const cont = document.getElementById(idLista);
      if (persone.length === 0) {
        cont.innerHTML = `<li class="vuoto">Nessun nome inserito.</li>`;
        return;
      }
      cont.innerHTML = persone.map(p => `
        <li>
          <span>${p.nome}</span>
          <button data-id="${p.id}">Elimina</button>
        </li>
      `).join("");

      cont.querySelectorAll("button[data-id]").forEach(btn => {
        btn.addEventListener("click", () => eliminaPartecipante(anno, btn.dataset.id));
      });
    }

    // ---------- Sorteggio ----------
    function mescola(array) {
      const copia = [...array];
      for (let i = copia.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copia[i], copia[j]] = [copia[j], copia[i]];
      }
      return copia;
    }

    // Distribuisce i BYE in modo uniforme tra gli slot del tabellone,
    // così non capitano mai due BYE vicini (quando i BYE sono la minoranza).
    function costruisciSlot(coppieShuffled, dimensione) {
      const numByes = dimensione - coppieShuffled.length;
      const slots = [];
      let indiceCoppia = 0;
      let accumulatore = 0;
      for (let i = 0; i < dimensione; i++) {
        accumulatore += numByes;
        if (numByes > 0 && accumulatore >= dimensione) {
          accumulatore -= dimensione;
          slots.push({ bye: true });
        } else {
          slots.push({ coppia: coppieShuffled[indiceCoppia++] });
        }
      }
      return slots;
    }

    function etichettaCoppia(c) {
      return `${c.uomo} - ${c.donna}`;
    }

    async function caricaStatoTorneo(anno) {
      const snap = await getDoc(doc(db, "tornei", anno));
      return snap.exists() ? snap.data() : {};
    }

    async function renderSorteggio(anno) {
      const cardEl = document.getElementById("card-sorteggio");
      const statoTorneo = await caricaStatoTorneo(anno);
      const snapCoppie = await getDocs(collection(db, "tornei", anno, "coppie"));

      if (snapCoppie.empty) {
        renderFormSorteggio(cardEl, anno);
      } else {
        await renderTabelloneEsistente(cardEl, anno, statoTorneo, snapCoppie);
      }
    }

    async function renderFormSorteggio(cardEl, anno) {
      const snapPartecipanti = await getDocs(collection(db, "tornei", anno, "partecipanti"));
      let numUomini = 0, numDonne = 0;
      snapPartecipanti.forEach(d => {
        if (d.data().genere === "uomo") numUomini++; else numDonne++;
      });

      const numCoppiePotenziali = numUomini;
      const dimensioniValide = [8, 16, 32].filter(d => d >= numCoppiePotenziali);
      const dimensioneConsigliata = dimensioniValide[0] || 32;

      cardEl.innerHTML = `
        <h2>Sorteggio e tabellone</h2>
        <p class="sottotitolo">
          ${numUomini} uomini, ${numDonne} donne inseriti.
          ${numUomini !== numDonne
            ? `<br><strong>Il numero di uomini e donne deve essere uguale per procedere.</strong>`
            : `Pronto per il sorteggio.`}
        </p>
        <div class="riga-sorteggio">
          <label style="font-family:var(--font-mono); font-size:0.8rem;">Dimensione tabellone:</label>
          <select id="select-dimensione">
            ${[8, 16, 32].map(d => `
              <option value="${d}" ${d === dimensioneConsigliata ? "selected" : ""} ${d < numCoppiePotenziali ? "disabled" : ""}>
                ${d} coppie
              </option>
            `).join("")}
          </select>
          <button class="btn btn-primario" id="btn-sorteggia" ${numUomini !== numDonne || numUomini === 0 ? "disabled" : ""}>
            🎲 Esegui sorteggio
          </button>
        </div>
      `;

      const btnSorteggia = document.getElementById("btn-sorteggia");
      if (btnSorteggia) {
        btnSorteggia.addEventListener("click", () => {
          const dimensione = Number(document.getElementById("select-dimensione").value);
          eseguiSorteggio(anno, dimensione);
        });
      }
    }

    async function eseguiSorteggio(anno, dimensione) {
      mostraMessaggio("Sorteggio in corso…", "successo");

      const snapPartecipanti = await getDocs(collection(db, "tornei", anno, "partecipanti"));
      const uomini = [];
      const donne = [];
      snapPartecipanti.forEach(d => {
        const dati = d.data();
        if (dati.genere === "uomo") uomini.push(dati.nome); else donne.push(dati.nome);
      });

      if (uomini.length !== donne.length) {
        mostraMessaggio("Il numero di uomini e donne deve essere uguale.", "errore");
        return;
      }
      if (uomini.length === 0) {
        mostraMessaggio("Inserisci almeno un partecipante prima di sorteggiare.", "errore");
        return;
      }
      if (uomini.length > dimensione) {
        mostraMessaggio(`Troppe coppie (${uomini.length}) per un tabellone da ${dimensione}.`, "errore");
        return;
      }

      const uominiMescolati = mescola(uomini);
      const donneMescolate = mescola(donne);
      const coppie = uominiMescolati.map((uomo, i) => ({ uomo, donna: donneMescolate[i] }));
      const coppieMescolate = mescola(coppie);

      const slots = costruisciSlot(coppieMescolate, dimensione);

      // Pulisce eventuali coppie/incontri di un sorteggio precedente
      const vecchieCoppie = await getDocs(collection(db, "tornei", anno, "coppie"));
      const vecchiIncontri = await getDocs(collection(db, "tornei", anno, "incontri"));
      if (!vecchieCoppie.empty || !vecchiIncontri.empty) {
        const batchPulizia = writeBatch(db);
        vecchieCoppie.forEach(d => batchPulizia.delete(d.ref));
        vecchiIncontri.forEach(d => batchPulizia.delete(d.ref));
        await batchPulizia.commit();
      }

      const batchScrittura = writeBatch(db);

      coppie.forEach((c, i) => {
        const rif = doc(collection(db, "tornei", anno, "coppie"));
        batchScrittura.set(rif, { numero: i + 1, uomo: c.uomo, donna: c.donna });
      });

      for (let i = 0; i < slots.length; i += 2) {
        const slotA = slots[i];
        const slotB = slots[i + 1];
        const squadraA = slotA.bye ? "BYE" : etichettaCoppia(slotA.coppia);
        const squadraB = slotB.bye ? "BYE" : etichettaCoppia(slotB.coppia);
        let vincitore = null;
        if (slotA.bye && !slotB.bye) vincitore = "b";
        if (slotB.bye && !slotA.bye) vincitore = "a";

        const rif = doc(collection(db, "tornei", anno, "incontri"));
        batchScrittura.set(rif, {
          turno: 0,
          posizione: i / 2,
          squadraA, squadraB, vincitore
        });
      }

      batchScrittura.set(doc(db, "tornei", anno), {
        dimensioneTabellone: dimensione,
        bloccato: false
      }, { merge: true });

      await batchScrittura.commit();
      mostraMessaggio("Sorteggio completato.", "successo");
      await renderSorteggio(anno);
    }

    function etichettaTurno(numeroMatch) {
      if (numeroMatch === 1) return "Finale";
      if (numeroMatch === 2) return "Semifinali";
      if (numeroMatch === 4) return "Quarti";
      if (numeroMatch === 8) return "Ottavi";
      return `${numeroMatch * 2} squadre`;
    }

    async function renderTabelloneEsistente(cardEl, anno, statoTorneo, snapCoppie) {
      const coppie = [];
      snapCoppie.forEach(d => coppie.push(d.data()));
      coppie.sort((a, b) => a.numero - b.numero);

      const snapIncontri = await getDocs(collection(db, "tornei", anno, "incontri"));
      const round0 = [];
      snapIncontri.forEach(d => { if (d.data().turno === 0) round0.push(d.data()); });
      round0.sort((a, b) => a.posizione - b.posizione);

      const dimensione = statoTorneo.dimensioneTabellone || round0.length * 2;
      const bloccato = !!statoTorneo.bloccato;

      // Calcola le colonne successive come turni "in attesa" (si popoleranno
      // quando aggiungeremo la selezione dei vincitori, fase successiva).
      const colonne = [round0.map(m => ({ a: m.squadraA, b: m.squadraB, vincitore: m.vincitore }))];
      let numMatchAttuale = round0.length;
      while (numMatchAttuale > 1) {
        numMatchAttuale = numMatchAttuale / 2;
        colonne.push(new Array(numMatchAttuale).fill(null));
      }

      cardEl.innerHTML = `
        <h2>Sorteggio e tabellone</h2>
        <p class="sottotitolo">
          Tabellone da ${dimensione} coppie.
          ${bloccato ? `<span class="badge-bloccato">🔒 Bloccato</span>` : ""}
        </p>

        <div class="griglia-coppie-lista">
          ${coppie.map(c => `
            <div class="coppia-mini">
              <strong>${c.numero}.</strong> ${c.uomo} — ${c.donna}
            </div>
          `).join("")}
        </div>

        <div class="tabellone-wrap">
          <div class="tabellone">
            ${colonne.map((matchList, indiceColonna) => `
              <div class="turno-colonna">
                <div class="turno-titolo">${etichettaTurno(matchList.length)}</div>
                ${matchList.map(m => renderMatchBox(m)).join("")}
              </div>
            `).join("")}
          </div>
        </div>

        <div class="riga-sorteggio" style="margin-top:1.2rem;">
          <button class="btn" id="btn-blocca">${bloccato ? "🔓 Sblocca sorteggio" : "🔒 Blocca sorteggio"}</button>
          ${!bloccato ? `<button class="btn" id="btn-rifai">↻ Rifai sorteggio</button>` : ""}
        </div>
      `;

      document.getElementById("btn-blocca").addEventListener("click", async () => {
        await setDoc(doc(db, "tornei", anno), { bloccato: !bloccato }, { merge: true });
        await renderSorteggio(anno);
      });

      const btnRifai = document.getElementById("btn-rifai");
      if (btnRifai) {
        btnRifai.addEventListener("click", () => {
          const confermato = window.confirm(
            "Rifare il sorteggio cancella le coppie e il tabellone attuali. Continuare?"
          );
          if (confermato) {
            renderFormSorteggio(cardEl, anno);
          }
        });
      }
    }

    function renderMatchBox(m) {
      if (!m) {
        return `
          <div class="match-box">
            <div class="lato vuoto">In attesa</div>
            <div class="lato vuoto">In attesa</div>
          </div>
        `;
      }
      const classeA = m.vincitore === "a" ? "vince" : (m.a === "BYE" ? "bye" : "");
      const classeB = m.vincitore === "b" ? "vince" : (m.b === "BYE" ? "bye" : "");
      return `
        <div class="match-box">
          <div class="lato ${classeA}">${m.a}</div>
          <div class="lato ${classeB}">${m.b}</div>
        </div>
      `;
    }
  </script>
</body>
</html>
